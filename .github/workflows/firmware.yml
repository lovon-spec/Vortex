name: Firmware

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/firmware.yml"
      - "Sources/VortexGUI/Resources/Firmware/**"
      - "scripts/firmware/**"
      - "docs/firmware/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/firmware.yml"
      - "Sources/VortexGUI/Resources/Firmware/**"
      - "scripts/firmware/**"
      - "docs/firmware/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify AArch64 EDK2 firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tool versions
        run: |
          set -euo pipefail
          git --version
          docker --version

      - name: Verify bundled firmware checksum
        run: scripts/firmware/verify-bundled-firmware.sh

      - name: Verify pinned QEMU release blob
        run: scripts/firmware/verify-qemu-source-blob.sh

      - name: Rebuild pinned ArmVirtQemu-AARCH64 firmware
        run: scripts/firmware/build-edk2-aarch64.sh --jobs 4

      - name: Upload rebuilt firmware
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: edk2-aarch64-code-fd
          path: .build/firmware/edk2-aarch64/out/edk2-aarch64-code.fd
          if-no-files-found: ignore
