name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SDK-neutral targets
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Cache SPM dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            .build/repositories
            .build/artifacts
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Swift version
        run: swift --version

      - name: Build SDK-neutral Swift targets
        # GitHub-hosted macos-15 currently ships Xcode 16.x and the macOS 15
        # SDK, which does not declare the macOS 26 VZVmnetNetworkDeviceAttachment
        # and vmnet_network_* APIs used by VortexVZ/VortexService/VortexGUI.
        # Keep hosted CI useful by validating targets that compile against the
        # public macOS 15 SDK; run full app builds on a macOS 26 host.
        run: |
          set -euo pipefail
          for target in \
            VortexCore \
            VortexPersistence \
            VortexHV \
            VortexAudio \
            VortexDevices \
            VortexBoot \
            VortexInterception
          do
            swift build --target "$target"
          done

      - name: Build guest tools
        run: make -C GuestTools/VortexAudioPlugin
