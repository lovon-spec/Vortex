name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Compile Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/repositories
            .build/artifacts
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Build tests (compile only)
        # Tests require Virtualization.framework entitlements and hardware
        # access that CI runners do not have. We compile them to catch type
        # errors and missing symbols.
        run: swift build --build-tests

      - name: Build guest tools
        run: make -C GuestTools/VortexAudioPlugin
